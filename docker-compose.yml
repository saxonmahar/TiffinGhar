version: '3.9'
services:
  api:
    build:
      context: ./tiffinghar-backend
    container_name: tiffinghar-api
    ports:
      - "5000:5000"
    env_file:
      - ./tiffinghar-backend/.env
    depends_on:
      - mongo

  mongo:
    image: mongo:7
    container_name: tiffinghar-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

volumes:
  mongo-data:
